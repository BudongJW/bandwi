name = "bandwi-signaling"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Durable Objects for WebSocket state management
[durable_objects]
bindings = [
  { name = "SIGNALING", class_name = "SignalingDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingDO"]

# Cron trigger: fetch free proxies every 20 minutes
[triggers]
crons = ["*/20 * * * *"]
